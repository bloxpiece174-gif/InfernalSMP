name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to upload release artifacts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Verify pom.xml exists before attempting build (helpful debug step)
      - name: Verify project structure
        run: |
          echo "Current directory: $(pwd)"
          echo "Files at root:"
          ls -la
          echo ""
          echo "Checking pom.xml exists:"
          test -f pom.xml && echo "✅ pom.xml found" || echo "❌ pom.xml NOT found — check your repo structure"

      - name: Build with Maven
        run: mvn -B package -DskipTests --file pom.xml

      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: HeartsSMP-v2
          # Exclude the original (non-shaded) jar, only keep the fat jar
          path: |
            target/HeartsSMP-*.jar
            !target/original-*.jar
          retention-days: 30
