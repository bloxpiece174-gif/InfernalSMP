name: HeartsSMP
version: 2.0.0
main: com.heartssmp.HeartsSMPPlugin
api-version: '1.21'
description: Hearts, Lives, Skills, Gems, God NPC, AI Integration, Divine Dimension

permissions:
  heartssmp.admin:
    description: Admin access to HeartsSMP commands
    default: op

commands:
  stats:
    description: View your stats
    usage: /stats [player]
  skills:
    description: List your skills
    usage: /skills
  skillinfo:
    description: View skill details
    usage: /skillinfo <skill_id>
  mastery:
    description: Upgrade skill mastery
    usage: /mastery <skill_id>
  gem:
    description: View your gem info
    usage: /gem
  sacrifice:
    description: Sacrifice a life
    usage: /sacrifice
  godsummon:
    description: Summon the God Entity
    usage: /godsummon [x y z]
  godadmin:
    description: God Entity & Trial admin command
    usage: /godadmin <subcommand>
    permission: heartssmp.admin
  adminhearts:
    description: Admin - modify hearts
    usage: /adminhearts <player> <set|add|remove> <amount>
    permission: heartssmp.admin
  adminlives:
    description: Admin - modify lives
    usage: /adminlives <player> <set|add|remove> <amount>
    permission: heartssmp.admin
  admingem:
    description: Admin - give gem
    usage: /admingem <player> <gem_id>
    permission: heartssmp.admin
  adminskill:
    description: Admin - give/remove skill
    usage: /adminskill <player> <give|remove> <skill_id>
    permission: heartssmp.admin
  adminitem:
    description: Admin - give item
    usage: /adminitem <player> <item_id> [amount]
    permission: heartssmp.admin
  adminunban:
    description: Admin - unban player
    usage: /adminunban <player>
    permission: heartssmp.admin
  adminmastery:
    description: Admin - instantly max mastery
    usage: /adminmastery <player> <skill|gem> <id|all>
    permission: heartssmp.admin
  admingodsummon:
    description: Admin - summon God in specific form
    usage: /admingodsummon <player> <25|50|75|guide>
    permission: heartssmp.admin
