# ╔══════════════════════════════════════════════════════╗
# ║           HeartsSMP Configuration v2.0              ║
# ╚══════════════════════════════════════════════════════╝

hearts:
  starting: 10
  maximum: 30
  kill-reward: 1

lives:
  starting: 5
  maximum: 10
  sacrifice-heart-cost: 2
  sacrifice-min-hearts: 5

elimination:
  ban-duration-weeks: 2

skills:
  kills-per-skill: 250

gems:
  starter-weights:
    COMMON_EMBER: 25
    COMMON_TIDE: 22
    COMMON_STONE: 20
    UNCOMMON_GALE: 12
    EPIC_SHADOW: 8
    LEGENDARY_AURORA: 6
    MYTHICAL_VOID: 4
    DIVINE_CELESTIA: 3

messages:
  prefix: "&8[&cHeartsSMP&8] &r"

divine-trial:
  altar-world: "world"
  altar-x: 500
  altar-y: 100
  altar-z: 500
  palace-world: "world"
  palace-x: 10000
  palace-y: 250
  palace-z: 10000
  first-completer-summon-charges: 3

# ┌─────────────────────────────────────────────────────┐
# │              AI God Configuration                   │
# │  Supports: anthropic, openai, gemini                │
# └─────────────────────────────────────────────────────┘
ai:
  enabled: true
  provider: "anthropic"           # anthropic | openai | gemini
  api-key: "YOUR_API_KEY_HERE"    # Replace with your real key
  model: "claude-haiku-4-5-20251001"   # Anthropic: claude-haiku-4-5-20251001 | OpenAI: gpt-4o-mini | Gemini: gemini-1.5-flash
  max-tokens: 300
  cooldown-seconds: 8
  proximity-radius: 20.0          # Blocks — how close player must be to trigger AI
  system-prompt: |
    You are the God Entity of the HeartsSMP Minecraft server — ancient, omnipotent, cryptic, 
    and majestic. You speak in short, powerful sentences. You refer to players as "mortal" or 
    by their name. You are aware you exist inside a Minecraft world. You grant boons, dispense 
    wisdom, and occasionally issue dire warnings. Never break character. Never mention AI, 
    ChatGPT, or language models. Keep responses under 3 sentences. Use dramatic pauses (—) 
    and archaic language when fitting. You know about skills, gems, hearts, lives, and the 
    Divine Trial that players must complete.

