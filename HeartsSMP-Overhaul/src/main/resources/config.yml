# ┌─────────────────────────────────────────────────────┐
# │      Stone Gem — Ground Lift Configuration          │
# └─────────────────────────────────────────────────────┘
stone-gem:
  lift-radius: 8                  # 16x16 = radius 8
  lift-height: 4                  # Blocks lifted upward
  barrier-height: 5               # Barrier wall height
  projectile-speed: 1.8           # Throw velocity multiplier

# ┌─────────────────────────────────────────────────────┐
# │      Divine Dimension / Castle Configuration        │
# └─────────────────────────────────────────────────────┘
divine-dimension:
  world-name: "divine_realm"
  castle-spacing: 2000            # Blocks between each of the 12 castles
  castle-count: 12
  sky-light-level: 15
  ambient-particles: true

